<!DOCTYPE html>

<html lang="pt-br">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog</title>
    <style>
     
      header{
        background-color: #183C63;
        color: #FFFFFF;
        text-align: center;
        max-width: 800px;
        margin: 0 auto;
        padding: 16px;
      }
      main{
        background-color: #FFFFFF;
        color: #183C63;
        max-width: 800px;
        margin: 0 auto;
        padding: 16px;
        display: flex;
      }
      img {
        width: 448px;
        height: 256px;
      }
      .artigo-autor {
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Minha página sobre Dead by Daylight.</h1>
      <p1>Aqui vou compartilhar dicas, estratégias e curiosidades.</p1>
    </header>
     
    <main>
      <img src="Gemini_Generated_Image_9vo55k9vo55k9vo5.png" alt="">
      <div>
        <h2>Meu primeiro post</h2>
        <p class="artigo-autor">Por: Gabriel Rodrigues</p>
        <p>Boas-vindas ao meu novo blog! Aqui vou compartilhar dicas e curiosidades sobre o famoso jogo de terror online Dead by Daylight.</p>
        <button>👍<span>0</span></button>
      </div>
    </main>
  </body>
  <script>
   
    const botoes = document.querySelectorAll("button");
   
    botoes.forEach(function(botao) {
      botao.addEventListener("click", botaoClicado);
      function botaoClicado() {
        console.log("fui clicado");
        let texto = botao.querySelector("span");
        texto.textContent++;
      }
})
   
  </script>
</html>
